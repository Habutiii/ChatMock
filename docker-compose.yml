services:
  chatmock:
    build:
      context: .
    container_name: chatmock
    command: ["serve"]
    env_file: .env
    environment:
      - CHATGPT_LOCAL_HOME=/app/data
    ports:
      - "127.0.0.1:9099:9099"
    volumes:
      - ./data:/app/data
      - ./prompt.md:/app/prompt.md:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:9099/health').status==200 else 1)\" "]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  chatmock-login:
    build:
      context: .
    profiles: ["login"]
    command: ["login"]
    environment:
      - CHATGPT_LOCAL_HOME=/app/data
      - CHATGPT_LOCAL_LOGIN_BIND=0.0.0.0
    volumes:
      - ./data:/app/data
    ports:
      - "1455:1455"
